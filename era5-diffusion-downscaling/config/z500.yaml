# Z500 (geopotential @ 500 hPa) — the original variable, with explicitly named
# per-variable paths so it can run alongside the t2m track without collisions.
# If you have existing data/checkpoints in the old unsuffixed dirs, rename them
# once (mv, nothing is re-downloaded or deleted):
#   mv datasets/raw datasets/raw_z500
#   mv datasets/patches datasets/patches_z500
#   mv checkpoints checkpoints_z500
#   mv results results_z500

seed: 42

paths:
  raw_dir: datasets/raw_z500
  patch_dir: datasets/patches_z500
  ckpt_dir: checkpoints_z500
  results_dir: results_z500
  log_dir: results_z500/tb

data:
  era5_zarr: "gs://weatherbench2/datasets/era5/1959-2022-6h-1440x721.zarr"
  gcs_token: anon
  variable: geopotential
  level: 500
  train_years: [2007, 2015]
  test_years: [2016, 2017]
  time_stride: 4

patches:
  size: 128
  per_field: 8
  lat_range: [-60.0, 60.0]

normalize:
  method: zscore

diffusion:
  timesteps: 1000
  beta_schedule: linear
  beta_start: 1.0e-4
  beta_end: 2.0e-2

unet:
  in_channels: 1
  out_channels: 1
  base_channels: 64
  channel_mults: [1, 2, 4, 8]
  num_res_blocks: 2
  time_emb_dim: 256
  attn_resolutions: [16]
  dropout: 0.1
  groupnorm_groups: 32

# Original (fine) encoder settings, kept for reproducing the first geo run.
# For a coarse-only rerun on Z500, mirror t2m.yaml: n_levels 8, finest 128.
geo:
  enabled: false
  input_dim: 3
  n_levels: 12
  n_features_per_level: 2
  log2_hashmap_size: 19
  base_resolution: 16
  finest_resolution: 512
  altitude: null

train:
  batch_size: 16
  epochs: 200
  lr: 2.0e-4
  weight_decay: 0.0
  grad_clip: 1.0
  amp: false
  ema_decay: 0.999
  num_workers: 4
  log_every: 50
  val_patches: 256
  ckpt_every_epochs: 1
  sample_every_epochs: 10

directmap:
  train_ratio: 4
  batch_size: 16
  epochs: 200
  lr: 2.0e-4
  grad_clip: 1.0
  amp: false

sample:
  ddim_eta: 0.0
  guidance_strength: 0.0
  interp: nearest
  reconstructions:
    - ratio: 4
      K: 3
      t_steps: [160, 114, 80]
      smooth_sigma: 0.0
    - ratio: 8
      K: 1
      t_steps: [320]
      smooth_sigma: 5.0

eval:
  n_test_patches: 256
  spectrum_bins: null
  hist_bins: 100

wandb:
  enabled: false
  project: era5-diffusion-downscaling
  entity: null
  name: null
