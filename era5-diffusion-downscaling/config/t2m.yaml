# 2m temperature variant — surface variable with strong geographic imprint
# (orography via lapse rate, land-sea contrast), the fair test for the
# geo-conditioning hypothesis. All paths are separate from the Z500 runs so
# neither data nor checkpoints can clobber each other.

seed: 42

paths:
  raw_dir: datasets/raw_t2m
  patch_dir: datasets/patches_t2m
  ckpt_dir: checkpoints_t2m
  results_dir: results_t2m
  log_dir: results_t2m/tb

data:
  era5_zarr: "gs://weatherbench2/datasets/era5/1959-2022-6h-1440x721.zarr"
  gcs_token: anon
  variable: 2m_temperature
  level: null                    # surface variable — no pressure level to select
  train_years: [2007, 2015]
  test_years: [2016, 2017]
  time_stride: 4                 # every 24h at a fixed hour (avoids diurnal aliasing)

patches:
  size: 128
  per_field: 8
  lat_range: [-60.0, 60.0]

normalize:
  method: zscore

diffusion:
  timesteps: 1000
  beta_schedule: linear
  beta_start: 1.0e-4
  beta_end: 2.0e-2

unet:
  in_channels: 1
  out_channels: 1
  base_channels: 64
  channel_mults: [1, 2, 4, 8]
  num_res_blocks: 2
  time_emb_dim: 256
  attn_resolutions: [16]
  dropout: 0.1
  groupnorm_groups: 32

# Coarser encoder than the Z500 runs: the fine levels there (res up to 512)
# overfit train-year anomalies (val loss got worse while fine-level table
# weights grew large). Static geography is smooth — cap the cells at ~150 km.
geo:
  enabled: false                   # train the baseline first, then set true
  # encoder: "hash" (Instant-NGP cube grid, default) or "healpix" (dense
  # equal-area spherical pyramid — no hash collisions; precompute once on the
  # cluster: python -m data.make_healpix_index --config config/t2m.yaml).
  encoder: hash
  healpix_nside_max: 128           # finest HEALPix level (~0.46 deg cells)
  input_dim: 3
  n_levels: 8
  n_features_per_level: 2
  log2_hashmap_size: 19
  base_resolution: 16
  finest_resolution: 128
  altitude: null

# Split-model Phase A: conditional diffusion on the residual HF - bicubic,
# ratio randomized per batch; test at a held-out ratio (6) for generalization.
residual:
  train_ratios: [2, 4, 8]
  n_steps: 100                     # DDIM steps when sampling the residual

train:
  batch_size: 16
  epochs: 200
  lr: 2.0e-4
  weight_decay: 0.0
  grad_clip: 1.0
  amp: false
  ema_decay: 0.999
  num_workers: 4
  log_every: 50
  val_patches: 256
  ckpt_every_epochs: 1
  sample_every_epochs: 10

directmap:
  train_ratio: 4
  batch_size: 16
  epochs: 200
  lr: 2.0e-4
  grad_clip: 1.0
  amp: false

sample:
  ddim_eta: 0.0
  guidance_strength: 0.0
  interp: nearest
  reconstructions:
    - ratio: 4
      K: 3
      t_steps: [160, 114, 80]
      smooth_sigma: 0.0
    - ratio: 8
      K: 1
      t_steps: [320]
      smooth_sigma: 5.0

eval:
  n_test_patches: 256
  spectrum_bins: null
  hist_bins: 100

wandb:
  enabled: false
  project: era5-diffusion-downscaling
  entity: null
  name: null
